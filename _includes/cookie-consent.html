<!-- Cookie Consent Banner -->
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@3.0.1/dist/cookieconsent.umd.css">
<script src="https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@3.0.1/dist/cookieconsent.umd.js"></script>

<script>
  window.CookieConsent.run({
    categories: {
      necessary: {
        enabled: true,
        readOnly: true
      },
      analytics: {
        enabled: false,
        readOnly: false
      }
    },
    onFirstConsent: () => {
      console.log('Consent given on first visit');
    },
    onConsent: () => {
      console.log('Consent updated');
    },
    onChange: ({cookie}) => {
      console.log('Consent changed:', cookie.categories);
    },
    cookies: {
      name: 'cc_cookie'
    },
    language: {
      default: 'en',
      autoDetect: 'browser'
    },
    gui_options: {
      consentModal: {
        layout: 'cloud',
        position: 'bottom center'
      },
      preferencesModal: {
        layout: 'box',
        equalizer: true
      }
    }
  });
</script>
