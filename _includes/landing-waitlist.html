<style>
.waitlist-section {
  padding: 80px 0;
  background: linear-gradient(135deg, #f0f9ff 0%, #f5f5f5 100%);
  border-top: 1px solid #e0e0e0;
}

.waitlist-container {
  max-width: 600px;
  margin: 0 auto;
  text-align: center;
}

.waitlist-section h2 {
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 20px;
  color: #404040;
}

.waitlist-section p {
  font-size: 1.05rem;
  color: #666;
  margin-bottom: 40px;
  line-height: 1.6;
}

.waitlist-form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.waitlist-form input,
.waitlist-form button {
  padding: 14px 20px;
  font-size: 1rem;
  border-radius: 6px;
  border: none;
}

.waitlist-form input {
  background-color: white;
  border: 2px solid #e0e0e0;
  color: #404040;
  transition: border-color 0.3s ease;
}

.waitlist-form input:focus {
  outline: none;
  border-color: #20C997;
  box-shadow: 0 0 0 3px rgba(32, 201, 151, 0.1);
}

.waitlist-form input::placeholder {
  color: #aaa;
}

.waitlist-form button {
  background-color: #20C997;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

.waitlist-form button:hover {
  background-color: #1aa179;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(32, 201, 151, 0.3);
}

.waitlist-form button:active {
  transform: translateY(0);
}

.form-note {
  font-size: 0.85rem;
  color: #999;
  margin-top: 20px;
}

@media (max-width: 768px) {
  .waitlist-section {
    padding: 60px 0;
  }

  .waitlist-section h2 {
    font-size: 1.6rem;
  }

  .waitlist-section p {
    font-size: 0.95rem;
  }
}
</style>

<section class="waitlist-section" id="waitlist">
  <div class="container-md">
    <div class="waitlist-container">
      <h2>Ready to Build Real Analytical Judgment?</h2>
      <p>Join other aspiring analysts, career changers, and teams building practical data skills.</p>

      <form class="waitlist-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <input
          type="email"
          name="email"
          placeholder="your@email.com"
          required
          autocomplete="email"
        />
        <input
          type="text"
          name="name"
          placeholder="Your name (optional)"
          autocomplete="name"
        />
        <button type="submit">Join the Waitlist</button>
        <p class="form-note">We'll email you when beta access opens. No spam, ever.</p>
      </form>
    </div>
  </div>
</section>
